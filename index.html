<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Музыкальный портал</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css.css">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">🎵 SoundWave</div>
      <nav>
        <ul>
          <li><a href="#">Главная</a></li>
          <li><a href="#tracks">Подборки</a></li>
          <li><a href="#feedback">Контакты</a></li>
        </ul>
      </nav>
      <button id="themeToggle" class="theme-toggle-btn" aria-label="Переключить тему">
        <span id="themeIcon">🌙</span> <span id="themeText">Тёмная</span>
      </button>
    </div>
  </header>

  <main>
    <section>
      <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Музыка без границ</h1>
      <p style="color: var(--text-secondary); font-size: 1.2rem;">Новые подборки, эксклюзивные треки и живой звук.</p>
    </section>

    <section id="tracks">
      <h2>🔥 Горячие треки</h2>
      <div id="tracksContainer" class="tracks-grid">
      </div>
      <div class="show-more-container">
        <button id="showMoreBtn" class="btn-show-more">Показать еще</button>
      </div>
    </section>

    <section id="feedback">
      <h2>📩 Обратная связь</h2>
      <form id="contactForm" class="feedback-form" novalidate>
        <div class="form-group">
          <label for="name">Имя</label>
          <input type="text" id="name" name="name" placeholder="Введите имя" autocomplete="name">
          <span class="error-message" id="nameError"></span>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="example@gmail.com" autocomplete="email">
          <span class="error-message" id="emailError"></span>
        </div>
        <div class="form-group">
          <label for="message">Сообщение</label>
          <textarea id="message" name="message" rows="4" placeholder="Ваше мнение о сайте..."></textarea>
          <span class="error-message" id="messageError"></span>
        </div>
        <button type="submit" class="btn-submit">Отправить</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 SoundWave. Все права защищены.</p>
    <p style="margin-top: 0.3rem;">Соцсети: Telegram · VK · YouTube</p>
  </footer>

  <script src="js.js"></script>
</body>
</html>
